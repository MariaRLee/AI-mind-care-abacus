<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI-Mind Care 算盤算力｜第二版</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#d1d5db;
      --frame:#5f3b28;
      --rod:#8b95a1;
      --bead-off-top:#f5c27e;
      --bead-off-bottom:#d98a39;
      --bead-on-top:#ff7849;
      --bead-on-bottom:#c2410c;
      --accent:#2563eb;
      --success:#15803d;
      --danger:#b91c1c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:18px;
    }
    .app{max-width:960px;margin:0 auto}
    header{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
      margin-bottom:14px;
    }
    h1{font-size:clamp(24px,4vw,38px);margin:0}
    .subtitle{margin:5px 0 0;color:var(--muted)}
    .stats{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      white-space:nowrap;
    }
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
    }
    .question-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .question{font-size:clamp(30px,7vw,54px);font-weight:800}
    .value-box{text-align:right;min-width:150px}
    .value-label{color:var(--muted);font-size:14px}
    .value{font-size:36px;font-weight:800;color:var(--accent)}

    .legend{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin:0 0 12px;
      font-size:14px;
      color:var(--muted);
    }
    .legend-item{display:flex;align-items:center;gap:6px}
    .legend-dot{
      width:18px;height:18px;border-radius:50%;
      border:2px solid rgba(0,0,0,.15);
    }
    .legend-dot.off{background:linear-gradient(var(--bead-off-top),var(--bead-off-bottom))}
    .legend-dot.on{background:linear-gradient(var(--bead-on-top),var(--bead-on-bottom))}

    .abacus-wrap{overflow-x:auto;padding:6px 0 10px}
    .abacus{
      position:relative;
      min-width:620px;
      height:460px;
      border:18px solid var(--frame);
      border-radius:16px;
      background:#fffaf3;
      padding:0 32px;
      user-select:none;
      touch-action:pan-x;
    }
    .beam{
      position:absolute;
      left:0;right:0;
      top:160px;
      height:24px;
      background:var(--frame);
      z-index:3;
      box-shadow:0 2px 0 rgba(255,255,255,.15) inset;
    }
    .columns{
      height:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:28px;
      position:relative;
      z-index:1;
    }
    .column{
      position:relative;
      height:100%;
      display:flex;
      justify-content:center;
    }
    .rod{
      position:absolute;
      top:0;bottom:0;
      width:7px;
      background:var(--rod);
      border-radius:4px;
    }
    .place{
      position:absolute;
      bottom:8px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 10px;
      font-size:13px;
      font-weight:700;
      z-index:6;
    }
    .bead{
      position:absolute;
      width:88px;
      height:40px;
      border:3px solid rgba(75,45,20,.22);
      border-radius:50% / 42%;
      background:linear-gradient(var(--bead-off-top),var(--bead-off-bottom));
      box-shadow:0 4px 8px rgba(0,0,0,.22), inset 0 2px 3px rgba(255,255,255,.65);
      cursor:grab;
      transition:top .16s ease, background .16s ease, box-shadow .16s ease, transform .08s ease;
      z-index:4;
      touch-action:none;
    }
    .bead:hover{box-shadow:0 5px 12px rgba(0,0,0,.28),0 0 0 4px rgba(37,99,235,.12)}
    .bead:active,.bead.dragging{cursor:grabbing;transform:scale(1.04)}
    .bead.active{
      background:linear-gradient(var(--bead-on-top),var(--bead-on-bottom));
      border-color:#8a2c06;
      box-shadow:0 5px 12px rgba(194,65,12,.35),0 0 0 4px rgba(255,120,73,.18);
    }

    .heaven{top:44px}
    .heaven.active{top:112px}

    .earth[data-index="0"]{top:202px}
    .earth[data-index="1"]{top:250px}
    .earth[data-index="2"]{top:298px}
    .earth[data-index="3"]{top:346px}

    .earth.active[data-index="0"]{top:184px}
    .earth.active[data-index="1"]{top:222px}
    .earth.active[data-index="2"]{top:260px}
    .earth.active[data-index="3"]{top:298px}

    .hit-area{
      position:absolute;
      width:118px;
      height:56px;
      left:50%;
      transform:translateX(-50%);
      z-index:2;
      border-radius:20px;
    }

    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button.action{
      appearance:none;border:none;border-radius:12px;
      padding:12px 18px;font-size:17px;font-weight:800;cursor:pointer;
    }
    .primary{background:var(--accent);color:#fff}
    .secondary{background:#e5e7eb;color:#111827}
    .message{min-height:28px;margin-top:12px;font-weight:800}
    .ok{color:var(--success)}
    .bad{color:var(--danger)}
    .report{
      display:none;margin-top:18px;padding:18px;border-radius:16px;
      background:#f0fdf4;border:1px solid #bbf7d0;
    }
    .report h2{margin:0 0 10px}
    .report-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .metric{
      background:#fff;border:1px solid #d1fae5;border-radius:12px;
      padding:14px;text-align:center;
    }
    .metric strong{display:block;font-size:27px}
    .hint{color:var(--muted);font-size:14px;margin-top:10px;line-height:1.7}

    @media (max-width:650px){
      body{padding:10px}
      header{align-items:flex-start;flex-direction:column}
      .stats{justify-content:flex-start}
      .panel{padding:12px}
      .report-grid{grid-template-columns:1fr}
      .bead{width:92px;height:42px}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>AI-Mind Care 算盤算力</h1>
        <p class="subtitle">第二版｜更靈敏的點擊與拖曳、更清楚的顏色差異</p>
      </div>
      <div class="stats">
        <div class="pill">題目 <span id="progress">1 / 5</span></div>
        <div class="pill">時間 <span id="timer">00:00</span></div>
        <div class="pill">答對 <span id="score">0</span></div>
      </div>
    </header>

    <section class="panel">
      <div class="question-row">
        <div>
          <div class="value-label">請用算盤撥出答案</div>
          <div class="question" id="question">12 + 7</div>
        </div>
        <div class="value-box">
          <div class="value-label">目前算盤數值</div>
          <div class="value" id="currentValue">0</div>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="legend-dot off"></span>未靠樑</div>
        <div class="legend-item"><span class="legend-dot on"></span>已靠樑、計入數值</div>
      </div>

      <div class="abacus-wrap">
        <div class="abacus" id="abacus" aria-label="模擬算盤">
          <div class="beam"></div>
          <div class="columns" id="columns"></div>
        </div>
      </div>

      <div class="actions">
        <button class="action primary" id="submitBtn">確認答案</button>
        <button class="action secondary" id="resetBtn">歸零</button>
        <button class="action secondary" id="restartBtn">重新開始</button>
      </div>

      <div class="message" id="message" aria-live="polite"></div>
      <p class="hint">
        操作方式：直接點擊珠子，或向中央橫樑方向拖曳。系統會自動吸附到正確位置；
        拖曳距離只需約 18 像素即可觸發。
      </p>

      <div class="report" id="report">
        <h2>本次算力結果</h2>
        <div class="report-grid">
          <div class="metric"><span>正確題數</span><strong id="reportCorrect">0 / 5</strong></div>
          <div class="metric"><span>正確率</span><strong id="reportAccuracy">0%</strong></div>
          <div class="metric"><span>完成時間</span><strong id="reportTime">00:00</strong></div>
        </div>
      </div>
    </section>
  </main>

<script>
(() => {
  const places = ["千位","百位","十位","個位"];
  const multipliers = [1000,100,10,1];
  const states = Array.from({length:4}, () => ({heaven:false, earth:0}));

  const columnsEl = document.getElementById("columns");
  const currentValueEl = document.getElementById("currentValue");
  const questionEl = document.getElementById("question");
  const progressEl = document.getElementById("progress");
  const scoreEl = document.getElementById("score");
  const timerEl = document.getElementById("timer");
  const messageEl = document.getElementById("message");
  const reportEl = document.getElementById("report");

  let questions = [];
  let index = 0;
  let correct = 0;
  let startedAt = null;
  let timerHandle = null;
  let finished = false;

  function addPointerSupport(bead, onClick, dragDirection){
    let startY = 0;
    let moved = false;
    let pointerId = null;

    bead.addEventListener("pointerdown", (e) => {
      pointerId = e.pointerId;
      startY = e.clientY;
      moved = false;
      bead.classList.add("dragging");
      try { bead.setPointerCapture(pointerId); } catch {}
    });

    bead.addEventListener("pointermove", (e) => {
      if(pointerId !== e.pointerId) return;
      if(Math.abs(e.clientY - startY) > 5) moved = true;
    });

    bead.addEventListener("pointerup", (e) => {
      if(pointerId !== e.pointerId) return;
      const deltaY = e.clientY - startY;
      bead.classList.remove("dragging");
      try { bead.releasePointerCapture(pointerId); } catch {}

      if(moved && Math.abs(deltaY) >= 18){
        dragDirection(deltaY);
      } else {
        onClick();
      }
      pointerId = null;
    });

    bead.addEventListener("pointercancel", () => {
      bead.classList.remove("dragging");
      pointerId = null;
    });
  }

  function buildAbacus(){
    columnsEl.innerHTML = "";
    places.forEach((place, colIndex) => {
      const col = document.createElement("div");
      col.className = "column";
      col.innerHTML = `<div class="rod"></div><div class="place">${place}</div>`;

      const heaven = document.createElement("button");
      heaven.className = "bead heaven";
      heaven.setAttribute("aria-label", `${place}上珠`);
      addPointerSupport(
        heaven,
        () => {
          ensureStarted();
          states[colIndex].heaven = !states[colIndex].heaven;
          render();
        },
        (deltaY) => {
          ensureStarted();
          // 上珠往下靠樑為啟用，往上離樑為停用
          states[colIndex].heaven = deltaY > 0;
          render();
        }
      );
      col.appendChild(heaven);

      for(let i=0;i<4;i++){
        const bead = document.createElement("button");
        bead.className = "bead earth";
        bead.dataset.index = String(i);
        bead.setAttribute("aria-label", `${place}下珠第${i+1}顆`);

        const activateByIndex = () => {
          ensureStarted();
          const activeCount = states[colIndex].earth;
          states[colIndex].earth = i < activeCount ? i : i + 1;
          render();
        };

        addPointerSupport(
          bead,
          activateByIndex,
          (deltaY) => {
            ensureStarted();
            // 下珠往上靠樑為啟用，往下離樑為停用
            if(deltaY < 0){
              states[colIndex].earth = Math.max(states[colIndex].earth, i + 1);
            } else {
              states[colIndex].earth = Math.min(states[colIndex].earth, i);
            }
            render();
          }
        );
        col.appendChild(bead);
      }
      columnsEl.appendChild(col);
    });
  }

  function render(){
    [...columnsEl.children].forEach((col, colIndex) => {
      const state = states[colIndex];
      col.querySelector(".heaven").classList.toggle("active", state.heaven);
      col.querySelectorAll(".earth").forEach((bead, i) => {
        bead.classList.toggle("active", i < state.earth);
      });
    });
    currentValueEl.textContent = getValue().toLocaleString("zh-TW");
  }

  function getValue(){
    return states.reduce((sum, s, i) =>
      sum + ((s.heaven ? 5 : 0) + s.earth) * multipliers[i], 0);
  }

  function resetAbacus(){
    states.forEach(s => { s.heaven = false; s.earth = 0; });
    render();
  }

  function generateQuestions(){
    const set = [];
    while(set.length < 5){
      const op = Math.random() < 0.65 ? "+" : "−";
      let a, b, answer;
      if(op === "+"){
        a = Math.floor(Math.random()*80)+5;
        b = Math.floor(Math.random()*40)+1;
        answer = a+b;
      } else {
        a = Math.floor(Math.random()*90)+10;
        b = Math.floor(Math.random()*a);
        answer = a-b;
      }
      if(answer <= 9999 && !set.some(q => q.a===a && q.b===b && q.op===op)){
        set.push({a,b,op,answer});
      }
    }
    return set;
  }

  function showQuestion(){
    const q = questions[index];
    questionEl.textContent = `${q.a} ${q.op} ${q.b}`;
    progressEl.textContent = `${index+1} / ${questions.length}`;
    messageEl.textContent = "";
    messageEl.className = "message";
    resetAbacus();
  }

  function ensureStarted(){
    if(startedAt || finished) return;
    startedAt = Date.now();
    timerHandle = setInterval(updateTimer, 250);
  }

  function elapsedSeconds(){
    return startedAt ? Math.floor((Date.now()-startedAt)/1000) : 0;
  }

  function formatTime(sec){
    const m = String(Math.floor(sec/60)).padStart(2,"0");
    const s = String(sec%60).padStart(2,"0");
    return `${m}:${s}`;
  }

  function updateTimer(){
    timerEl.textContent = formatTime(elapsedSeconds());
  }

  function submit(){
    if(finished) return;
    ensureStarted();
    const q = questions[index];
    const value = getValue();

    if(value === q.answer){
      correct++;
      scoreEl.textContent = String(correct);
      messageEl.textContent = "答對了！";
      messageEl.className = "message ok";
    } else {
      messageEl.textContent = `答案是 ${q.answer}，目前算盤為 ${value}。`;
      messageEl.className = "message bad";
    }

    setTimeout(() => {
      index++;
      if(index >= questions.length){
        finish();
      } else {
        showQuestion();
      }
    }, 700);
  }

  function finish(){
    finished = true;
    clearInterval(timerHandle);
    updateTimer();
    questionEl.textContent = "練習完成";
    progressEl.textContent = "5 / 5";
    document.getElementById("reportCorrect").textContent = `${correct} / 5`;
    document.getElementById("reportAccuracy").textContent = `${Math.round(correct/5*100)}%`;
    document.getElementById("reportTime").textContent = formatTime(elapsedSeconds());
    reportEl.style.display = "block";
    messageEl.textContent = "已完成本次 AI-Mind Care 算力練習。";
    messageEl.className = "message ok";
  }

  function restart(){
    clearInterval(timerHandle);
    questions = generateQuestions();
    index = 0;
    correct = 0;
    startedAt = null;
    timerHandle = null;
    finished = false;
    timerEl.textContent = "00:00";
    scoreEl.textContent = "0";
    reportEl.style.display = "none";
    showQuestion();
  }

  document.getElementById("submitBtn").addEventListener("click", submit);
  document.getElementById("resetBtn").addEventListener("click", () => {
    ensureStarted();
    resetAbacus();
  });
  document.getElementById("restartBtn").addEventListener("click", restart);

  buildAbacus();
  restart();
})();
</script>
</body>
</html>
